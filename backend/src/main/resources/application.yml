server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/limitr}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  auth:
    registration-mode: ${AUTH_REGISTRATION_MODE:bootstrap}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    allow-insecure-secret: false
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    admin:
      username: ${SEED_ADMIN_USERNAME:admin}
      password: ${SEED_ADMIN_PASSWORD:admin12345}
    client:
      principal-id: ${SEED_CLIENT_PRINCIPAL_ID:local-client}
      api-key: ${SEED_API_KEY:local-free-key}
