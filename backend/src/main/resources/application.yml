server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:limitr;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:limitr-demo-secret-key-change-this-in-production-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  demo:
    admin:
      username: ${DEMO_ADMIN_USERNAME:admin}
      password: ${DEMO_ADMIN_PASSWORD:admin12345}
    client:
      principal-id: ${DEMO_CLIENT_PRINCIPAL_ID:demo-client}
      api-key: ${DEMO_API_KEY:demo-free-key}
