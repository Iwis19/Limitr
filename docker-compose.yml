services:
  postgres:
    image: postgres:16-alpine
    container_name: limitr-postgres
    environment:
      POSTGRES_DB: limitr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - limitr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limitr"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  limitr-postgres-data:
