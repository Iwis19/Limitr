<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Limitr</h1>
        <p>Security Console</p>
      </div>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">Overview</a>
      <a routerLink="/logs" routerLinkActive="active">Logs</a>
      <a routerLink="/incidents" routerLinkActive="active">Incidents</a>
      <a routerLink="/rules" routerLinkActive="active">Rules</a>
    </nav>

    <div class="actions">
      <button type="button" (click)="toggleTheme()">
        {{ darkMode ? 'Light Mode' : 'Dark Mode' }}
      </button>
      <button type="button" class="danger" (click)="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
