<div class="shell">
  <main class="content">
    <header class="content-header">
      <div class="header-left">
        <div class="brand-dot"></div>
        <div class="brand-copy">
          <h1 class="pixel-type">LIMITR_CONSOLE</h1>
          <p>Realtime protection workspace</p>
        </div>
      </div>

      <nav class="top-nav-pills">
        <a
          *ngFor="let item of topNav"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="top-nav-item"
        >
          {{ item.label }}
        </a>
      </nav>

      <div class="header-right">
        <div class="top-status pixel-type">
          <div class="status-dot"></div>
          SYSTEM OPERATIONAL
        </div>
        <button type="button" class="header-btn" (click)="toggleTheme()">
          {{ darkMode ? 'Light Mode' : 'Dark Mode' }}
        </button>
        <button type="button" class="header-btn danger" (click)="logout()">Sign Out</button>
      </div>
    </header>

    <section class="content-body">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
